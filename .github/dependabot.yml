version: 2

updates:
    - package-ecosystem: 'composer'
      directory: '/'
      schedule:
          interval: 'weekly'
      open-pull-requests-limit: 5
      commit-message:
          prefix: 'composer'
      labels:
          - 'dependencies'
          - 'php'

    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
      open-pull-requests-limit: 5
      commit-message:
          prefix: 'npm'
      labels:
          - 'dependencies'
          - 'frontend'
